[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
markers =
    live: marks tests that make real LLM/API calls (deselect with '-m "not live"')
    temporal: marks tests that spin up a Temporal WorkflowEnvironment test server (needs network access on first run to download it; deselect with '-m "not temporal"')
addopts = -m "not live and not temporal"
